<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudando - study_if</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flip-card { perspective: 1200px; }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flipped { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-radius: 1.5rem; padding: 2.5rem;
        }
        .flip-card-front {
            background: #0f172a;
            border: 2px solid #1e293b;
        }
        .flip-card-back {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            border: 2px solid #1d4ed8;
            transform: rotateY(180deg);
        }
        .btn-nota { transition: all 0.15s ease; }
        .btn-nota:hover { transform: translateY(-2px); }
        @keyframes cardEntrada {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .entrada { animation: cardEntrada 0.3s ease forwards; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center px-4 py-6 font-sans">

<!-- Header -->
<div class="w-full max-w-2xl flex justify-between items-center mb-8">
    <a href="/dashboard.html" class="text-slate-500 hover:text-white transition text-sm font-semibold">← Sair</a>
    <span class="text-xl font-black italic text-blue-500">study_if</span>
    <div id="badge-contador" class="bg-slate-800 border border-slate-700 px-3 py-1 rounded-full text-xs font-bold text-slate-300">
        –
    </div>
</div>

<!-- Barra de progresso -->
<div class="w-full max-w-2xl mb-8">
    <div class="flex justify-between text-xs text-slate-500 mb-1.5">
        <span id="txt-progresso">0 concluídos</span>
        <span id="txt-total">– cards</span>
    </div>
    <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
        <div id="progresso-barra" class="bg-blue-500 h-full rounded-full transition-all duration-500" style="width:0%"></div>
    </div>
</div>

<!-- Área principal -->
<div id="estudo-area" class="w-full max-w-2xl flex-1">

    <!-- Card flip -->
    <div id="card-clique" class="flip-card w-full h-[380px] cursor-pointer mb-6 entrada">
        <div id="card-inner" class="flip-card-inner">

            <div class="flip-card-front">
                <span class="text-[11px] font-black uppercase tracking-widest text-blue-500 mb-auto mt-2">Pergunta</span>
                <p id="txt-frente" class="text-2xl font-bold leading-snug text-center text-white">Carregando...</p>
                <p class="text-slate-600 text-xs mt-auto animate-pulse">Clique para revelar</p>
            </div>

            <div class="flip-card-back">
                <span class="text-[11px] font-black uppercase tracking-widest text-blue-300 mb-auto mt-2">Resposta</span>
                <p id="txt-verso" class="text-xl font-medium leading-relaxed text-center text-slate-100 italic">–</p>
                <div class="mt-auto w-full">
                    <p class="text-xs text-slate-500 text-center mb-3">Como você foi?</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Botões de nota (só aparecem após virar o card) -->
    <div id="botoes-nota" class="hidden space-y-3">

        <!-- Linha 1: Não lembrei / Errei -->
        <div class="grid grid-cols-2 gap-3">
            <button onclick="responder(0)" class="btn-nota flex flex-col items-center justify-center gap-1 py-4 bg-slate-900 border-2 border-red-600/40 hover:border-red-500 hover:bg-red-500/10 rounded-2xl transition">
                <span class="text-xl">😶</span>
                <span class="text-xs font-black text-red-400 uppercase">Blackout</span>
                <span class="text-[10px] text-slate-600">Não lembrei nada</span>
            </button>
            <button onclick="responder(1)" class="btn-nota flex flex-col items-center justify-center gap-1 py-4 bg-slate-900 border-2 border-orange-600/40 hover:border-orange-500 hover:bg-orange-500/10 rounded-2xl transition">
                <span class="text-xl">😬</span>
                <span class="text-xs font-black text-orange-400 uppercase">Errei</span>
                <span class="text-[10px] text-slate-600">Errei, mas reconheci</span>
            </button>
        </div>

        <!-- Linha 2: Acertei com dificuldade / Acertei / Fácil -->
        <div class="grid grid-cols-3 gap-3">
            <button onclick="responder(3)" class="btn-nota flex flex-col items-center justify-center gap-1 py-4 bg-slate-900 border-2 border-yellow-600/40 hover:border-yellow-500 hover:bg-yellow-500/10 rounded-2xl transition">
                <span class="text-xl">😅</span>
                <span class="text-xs font-black text-yellow-400 uppercase">Difícil</span>
                <span class="text-[10px] text-slate-600">Acertei hesitando</span>
            </button>
            <button onclick="responder(4)" class="btn-nota flex flex-col items-center justify-center gap-1 py-4 bg-slate-900 border-2 border-emerald-600/40 hover:border-emerald-500 hover:bg-emerald-500/10 rounded-2xl transition">
                <span class="text-xl">😊</span>
                <span class="text-xs font-black text-emerald-400 uppercase">Acertei</span>
                <span class="text-[10px] text-slate-600">Lembrei bem</span>
            </button>
            <button onclick="responder(5)" class="btn-nota flex flex-col items-center justify-center gap-1 py-4 bg-slate-900 border-2 border-blue-600/40 hover:border-blue-500 hover:bg-blue-500/10 rounded-2xl transition">
                <span class="text-xl">🚀</span>
                <span class="text-xs font-black text-blue-400 uppercase">Fácil</span>
                <span class="text-[10px] text-slate-600">Na hora, sem pensar</span>
            </button>
        </div>

    </div>

</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const deckId = urlParams.get('id');

    let fila = [];       // cards pendentes hoje
    let totalInicio = 0;
    let concluidos  = 0;

    async function carregarEstudo() {
        if (!deckId) { window.location.href = '/dashboard.html'; return; }

        try {
            const res  = await fetch(`/api/flashcards/deck/${deckId}/pendentes`);
            fila = await res.json();

            if (!fila.length) {
                mostrarConcluido(true); // "Em dia" — nada para revisar hoje
                return;
            }

            totalInicio = fila.length;
            atualizarUI();
            mostrarCard();
        } catch(e) {
            console.error('Erro ao carregar estudo:', e);
        }
    }

    function mostrarCard() {
        if (!fila.length) { mostrarConcluido(false); return; }

        const card = fila[0];
        const inner = document.getElementById('card-inner');

        // Desvira se estiver virado
        if (inner.classList.contains('flipped')) {
            inner.classList.remove('flipped');
            setTimeout(() => preencherCard(card), 280);
        } else {
            preencherCard(card);
        }

        document.getElementById('botoes-nota').classList.add('hidden');
    }

    function preencherCard(card) {
        document.getElementById('txt-frente').innerText = card.front;
        document.getElementById('txt-verso').innerText  = card.back;
    }

    // Virar o card
    document.getElementById('card-clique').onclick = function() {
        const inner = document.getElementById('card-inner');
        if (!fila.length) return;
        inner.classList.add('flipped');
        document.getElementById('botoes-nota').classList.remove('hidden');
    };

    async function responder(nota) {
        const card = fila[0];
        fila.shift();

        // Envia ao backend
        try {
            await fetch('/api/flashcards/revisar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ flashcardId: card.flashcardId, nota })
            });
        } catch(e) { console.error('Erro ao salvar revisão:', e); }

        // Nota < 3 → volta para o final da fila (vai revisar de novo hoje)
        if (nota < 3) {
            fila.push(card);
        } else {
            concluidos++;
        }

        atualizarUI();

        if (!fila.length) {
            setTimeout(() => mostrarConcluido(false), 400);
        } else {
            mostrarCard();
        }
    }

    function atualizarUI() {
        const restantes = fila.length;
        const pct       = totalInicio > 0 ? Math.min((concluidos / totalInicio) * 100, 100) : 0;

        document.getElementById('progresso-barra').style.width = pct + '%';
        document.getElementById('badge-contador').innerText    = restantes + ' restantes';
        document.getElementById('txt-progresso').innerText     = concluidos + ' concluídos';
        document.getElementById('txt-total').innerText         = totalInicio + ' para hoje';
    }

    function mostrarConcluido(emDia) {
        const msg = emDia
            ? { emoji: '✅', titulo: 'Você está em dia!', sub: 'Não há cards para revisar hoje. Volte amanhã.' }
            : { emoji: '🏆', titulo: 'Sessão concluída!', sub: `Você revisou ${concluidos} card${concluidos !== 1 ? 's' : ''} hoje. Continue assim!` };

        document.getElementById('estudo-area').innerHTML = `
            <div class="text-center py-16 bg-slate-900 border border-slate-800 rounded-3xl">
                <div class="text-6xl mb-5">${msg.emoji}</div>
                <h2 class="text-3xl font-black mb-2">${msg.titulo}</h2>
                <p class="text-slate-400 mb-8 max-w-xs mx-auto">${msg.sub}</p>
                <div class="flex flex-col sm:flex-row gap-3 justify-center px-8">
                    <button onclick="window.location.href='/dashboard.html'"
                            class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition shadow-lg">
                        Voltar aos Baralhos
                    </button>
                    <button onclick="window.location.href='/questoes.html'"
                            class="px-8 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-bold transition">
                        Fazer Simulado
                    </button>
                </div>
            </div>`;

        document.getElementById('progresso-barra').style.width = '100%';
        document.getElementById('badge-contador').innerText = 'Concluído!';
    }

    window.onload = carregarEstudo;
</script>
</body>
</html>
